spack:
  config:
    deprecated: true
  include:
  # Toolchain defintion.
  # Defines the compiler (gcc or llvm/clang) and version.
  - git: https://github.com/art-framework-suite/art-release-configs
    tag: art-3.14.04
    paths:
    - included_yaml/gcc-12-toolchain.yaml

  # Packages defintions.
  # These are version and variant requirements for a package suite
  - git: https://github.com/LArSoft/larsoft-release-configs
    tag: larsoft-10.20.03
    paths:
    - included_yaml/larsoft-packages.yaml

  - git: https://github.com/NuSoftHEP/nusofthep-release-configs
    tag: nusofthep-3.22.00
    paths:
    - included_yaml/nusofthep-packages.yaml

  - git: https://github.com/art-framework-suite/art-release-configs
    tag: art-3.14.04
    paths:
    - included_yaml/packages-art.yaml

  - git: https://github.com/fnal-fife/fife-release-configs
    commit: 4d43722522644a481f2b8aa7a4981b98a5df30e5
    paths:
    - included_yaml/fife_packages.yaml


  # Spec definitions.
  # These are definitions of the root specs for a package suite
  - git: https://github.com/LArSoft/larsoft-release-configs
    tag: larsoft-10.20.03
    paths:
    - included_yaml/larsoft-specs.yaml

  - git: https://github.com/NuSoftHEP/nusofthep-release-configs
    tag: nusofthep-3.22.00
    paths:
    - included_yaml/nusofthep-specs.yaml

  - git: https://github.com/art-framework-suite/art-release-configs
    tag: art-3.14.04
    paths:
    - included_yaml/specs-art.yaml

  - git: https://github.com/fnal-fife/fife-release-configs
    commit: 4d43722522644a481f2b8aa7a4981b98a5df30e5
    paths:
    - included_yaml/fife_specs.yaml

  definitions:
    - specs_dune:
      - duneana@develop %build_compiler
      - duneanaobj@develop %build_compiler
      - dunecalib@develop %build_compiler
      - dunecore@develop %build_compiler
      - dunedaqdataformats@develop %build_compiler
      - dunedataprep@develop %build_compiler
      - dunedetdataformats@develop %build_compiler
      - duneexamples@develop %build_compiler
      - duneopdet@develop %build_compiler
      - dunepdlegacy@develop %build_compiler
      - duneprototypes@develop %build_compiler
      - dunereco@develop %build_compiler
      - dunesim@develop %build_compiler
      - dunesw@develop %build_compiler
      - duneutil@develop %build_compiler
      - protoduneana@develop %build_compiler
      - gfal2-util %build_compiler
      - r-m-dd-config %build_compiler
    - specs_sbn:
      - sbnalg@develop %build_compiler
      - sbnanaobj@develop %build_compiler
      - sbndaq-artdaq-core@develop %build_compiler
      - sbncode@develop %build_compiler
      - sbnobj@develop %build_compiler
      - sbndcode@develop %build_compiler
    - specs_icarus:
      - icaruscode@develop %build_compiler
      - icarus-signal-processing@develop %build_compiler
      - icarusalg@develop %build_compiler

  upstreams:
    cvmfs-larsoft:
      install_tree: /cvmfs/larsoft.opensciencegrid.org/spack-fnal-v1.1.0/spack_env/opt/spack

  specs:
    - $specs_art
    - $specs_nusofthep
    - $specs_larsoft
    - $fife_specs
    - $specs_dune
    - $specs_sbn
    - $specs_icarus
    - artdaq-core %build_compiler
    - larcv2 %build_compiler
    - nusystematics %build_compiler
    - systematicstools %build_compiler
    - r-m-dd-config
    - py-srproxy
    - py-ipykernel

  concretizer:
    unify: true
    reuse:
      from:
      - type: environment
        path: /cvmfs/larsoft.opensciencegrid.org/spack-fnal-v1.1.0/spack_env/var/spack/environments/larsoft-v10_20_03-unified-cuda-python-3_9-trimmed-rc1
  packages:
    all:
      providers:
        libc:
        - glibc
        'zlib-api:':
        - zlib
      variants:
      - generator=ninja
      - build_type=Release
      - cxxstd=17
      target:
      - x86_64_v3
    cuda:
      require:
      - "@12.6"
    geant4:
      require:
      - build_type=RelWithDebInfo
      - generator=ninja
      - cxxstd=17
    grpc:
      require:
      - build_type=RelWithDebInfo
      - generator=ninja
      - cxxstd=17
    py-tensorflow:
      require:
      - +cuda
      - cuda_arch=80
    py-torch:
      require:
      - +cuda
      - cuda_arch=80
    r-m-dd-config:
      require:
      - experiment=dune
    root:
      require:
      - +xrootd
    nusystematics:
      require:
      - "@1"
    systematicstools:
      require:
      - "@1"
