spack:
  config:
    deprecated: true
  include:

  - git: https://github.com/art-framework-suite/art-release-configs
    tag: art-3.14.04
    paths:
    - included_yaml/gcc-12-toolchain.yaml
    - included_yaml/packages-art.yaml
    - included_yaml/specs-art.yaml

  - git: https://github.com/SBNSoftware/sbn-release-configs
    branch: main
    paths:
    - included_yaml/sbn-packages.yaml
    - included_yaml/sbnd-packages.yaml
    - included_yaml/icarus-packages.yaml

  - git: https://github.com/DUNE/dune-release-configs
    branch: main
    paths:
    - included_yaml/dune-packages.yaml

  - git: https://github.com/uboone/uboone-release-configs
    branch: main
    paths:
    - included_yaml/uboone_packages.yaml

  - git: https://github.com/LArSoft/larsoft-release-configs
    tag: larsoft-10.21.02
    paths:
    - included_yaml/larsoft-packages.yaml
    - included_yaml/larsoft-specs.yaml

  - git: https://github.com/NuSoftHEP/nusofthep-release-configs
    tag: nusofthep-3.22.01
    paths:
    - included_yaml/nusofthep-packages.yaml
    - included_yaml/nusofthep-specs.yaml

  - git: https://github.com/fnal-fife/fife-release-configs
    tag: 2.8.0.4
    paths:
    - included_yaml/fife_packages.yaml
    - included_yaml/fife_specs.yaml

  definitions:

# The following definitions should be defined by experiments in exp_packages.yaml and exp_specs.yaml
# and the git:(repo urls) and tag: or commit: included above.
#
  - specs_dune:
      - duneana %build_compiler
      - duneanaobj %build_compiler
      - dunecalib %build_compiler
      - dunecore %build_compiler
      - dunedaqdataformats %build_compiler
      - dunedataprep %build_compiler
      - dunedetdataformats %build_compiler
      - duneexamples %build_compiler
      - duneopdet %build_compiler
      - dunepdlegacy %build_compiler
      - duneprototypes %build_compiler
      - dunereco %build_compiler
      - dunesim %build_compiler
      - dunesw %build_compiler
      - duneutil %build_compiler
      - protoduneana %build_compiler
      - gfal2-util %build_compiler
      - r-m-dd-config %build_compiler
  - specs_sbn:
      - sbnalg %build_compiler
      - sbnanaobj %build_compiler
      - sbncode %build_compiler
      - sbnobj %build_compiler
  - specs_sbnd:
      - sbndcode %build_compiler
  - specs_icarus:
      - icaruscode %build_compiler
      - icarus-signal-processing %build_compiler
      - icarusalg %build_compiler
  - specs_uboone:
      - ubana%build_compiler
      - ubcore%build_compiler
      - ubcrt%build_compiler
      - ubcv%build_compiler
      - ubevt%build_compiler
      - ublite%build_compiler
      - ubobj%build_compiler
      - uboonecode%build_compiler
      - ubraw%build_compiler
      - ubreco%build_compiler
      - ubsim%build_compiler
      - ubutil%build_compiler

  specs:
    - $specs_art
    - $specs_nusofthep
    - $specs_larsoft
    - $fife_specs
    - $specs_dune
    - $specs_icarus
    - $specs_sbn
    - $specs_sbnd
    - $specs_uboone
    - artdaq-core %build_compiler
    - larcv2 %build_compiler
    - larcv %build_compiler
    - nusystematics %build_compiler
    - systematicstools %build_compiler
    - r-m-dd-config
    - py-srproxy
    - py-ipykernel
    - geant4reweight
    - snakemake
  concretizer:
    unify: true
    reuse:
      from:
      - type: local
      - type: external
  view: false
  packages:
    all:
      providers:
        libc:
        - glibc
        'zlib-api:':
        - zlib
      variants:
      - generator=ninja
      - build_type=Release
      - cxxstd=17
      target:
      - x86_64_v3
    python:
      require:
      - "@:3.11"
    cuda:
      require:
      - "@12.6"
    geant4:
      require:
      - build_type=RelWithDebInfo
      - generator=ninja
      - cxxstd=17
    grpc:
      require:
      - build_type=RelWithDebInfo
      - generator=ninja
      - cxxstd=17
    py-tensorflow:
      require:
      - +cuda
      - cuda_arch=80
    py-torch:
      require:
      - +cuda
      - cuda_arch=80
      - ~custom-protobuf
    r-m-dd-config:
      require:
      - experiment=dune
    root:
      require:
      - +xrootd
    nusystematics:
      require:
      - "@1"
    systematicstools:
      require:
      - "@1"
    trace:
      require:
      - "@:v3_23_00"
    'duneana:':
      require:
      - "@develop"
    'duneanaobj:':
      require:
      - "@develop"
    'dunecalib:':
      require:
      - "@develop"
    'dunecore:':
      require:
      - "@develop"
    'dunedaqdataformats:':
      require:
      - "@develop"
    'dunedataprep:':
      require:
      - "@develop"
    'dunedetdataformats:':
      require:
      - "@develop"
    'duneexamples:':
      require:
      - "@develop"
    'duneopdet:':
      require:
      - "@develop"
    'dunepdlegacy:':
      require:
      - "@develop"
    'duneprototypes:':
      require:
      - "@develop"
    'dunereco:':
      require:
      - "@develop"
    'dunesim:':
      require:
      - "@develop"
    'dunesw:':
      require:
      - "@develop"
    'duneutil:':
      require:
      - "@develop"
    'protoduneana:':
      require:
      - "@develop"
    'sbnalg:':
      require:
      - '@develop'
    'sbnanaobj:':
      require:
      - '@develop'
    'sbncode:':
      require:
      - '@develop'
    'sbndcode:':
      require:
      - '@develop'
    'sbndaq-artdaq-core:':
      require:
      - "@develop"
    'sbnobj:':
      require:
      - '@develop'
    'icarus-signal-processing:':
      require:
      - '@develop'
    'icaruscode:':
      require:
      - '@develop'
    'icarusalg:':
      require:
      - '@develop'
    'ubana:':
      require:
      - '@develop'
    'ubcore:':
      require:
      - '@develop'
    'ubcrt:':
      require:
      - '@develop'
    'ubcv:':
      require:
      - '@develop'
    'ubevt:':
      require:
      - '@develop'
    'ublite:':
      require:
      - '@develop'
    'ubobj:':
      require:
      - '@develop'
    'uboonecode:':
      require:
      - '@develop'
    'ubraw:':
      require:
      - '@develop'
    'ubreco:':
      require:
      - '@develop'
    'ubsim:':
      require:
      - '@develop'
    sbndata:
      externals:
      - spec: sbndata@01_08
        prefix: /cvmfs/sbn.opensciencegrid.org/products/sbn/sbndata/v01_08
    sbnd-data:
      externals:
      - spec: sbnd-data@01_42_00
        prefix: /cvmfs/sbnd.opensciencegrid.org/products/sbnd/sbnd_data/v01_42_00
    icarus-data:
      externals:
      - spec: icarus-data@10.20.03
        prefix: /cvmfs/icarus.opensciencegrid.org/products/icarus/icarus_data/v10_20_03
      - spec: icarus-data@10.20.04
        prefix: /cvmfs/icarus.opensciencegrid.org/products/icarus/icarus_data/v10_20_04
    uboonedata:
      externals:
      - spec: uboonedata@10_20_04
        prefix: /cvmfs/uboone.opensciencegrid.org/products/uboonedata/v10_20_04
    dune-pardata:
      externals:
      - spec: dune-pardata@01.84.00
        prefix: /cvmfs/dune.opensciencegrid.org/products/dune/dune_pardata/v01_84_00
    uboone-photon-propagation:
