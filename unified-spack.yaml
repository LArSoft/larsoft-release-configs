spack:
  config:
    deprecated: true
  include:
  # Toolchain defintion.
  # Defines the compiler (gcc or llvm/clang) and version.
  - git: https://github.com/art-framework-suite/art-release-configs
    tag: art-3.14.04
    paths:
    - included_yaml/gcc-12-toolchain.yaml
  # Packages defintions.
  # SBNSoftware
  - git: https://github.com/SBNSoftware/sbn-release-configs
    commit: 33a33f2f5229c6b017a098a1f4243a377acd04c4
    paths:
    - included_yaml/sbn-packages.yaml
  - git: https://github.com/SBNSoftware/sbn-release-configs
    commit: 33a33f2f5229c6b017a098a1f4243a377acd04c4
    paths:
    - included_yaml/sbn-specs.yaml
  # DUNE packages
  - git: https://github.com/DUNE/dune-release-configs
    commit: f2ff5419c5850b54cb944c97bd5357ff46512f53
    paths:
    - included_yaml/dune-packages.yaml
  # These are version and variant requirements for a package suite
  - git: https://github.com/LArSoft/larsoft-release-configs
    tag: larsoft-10.11.01
    paths:
    - included_yaml/packages-larsoft.yaml
  - git: https://github.com/NuSoftHEP/nusofthep-release-configs
    tag: nusofthep-3.22.00
    paths:
    - included_yaml/packages-nusofthep.yaml
  - git: https://github.com/art-framework-suite/art-release-configs
    tag: art-3.14.04
    paths:
    - included_yaml/packages-art.yaml
  - git: https://github.com/fnal-fife/fife-release-configs
    commit: 4d43722522644a481f2b8aa7a4981b98a5df30e5
    paths:
    - included_yaml/fife_packages.yaml
  # Spec definitions.
  # These are definitions of the root specs for a package suite
  - git: https://github.com/LArSoft/larsoft-release-configs
    tag: larsoft-10.11.01
    paths:
    - included_yaml/specs-larsoft.yaml
  - git: https://github.com/NuSoftHEP/nusofthep-release-configs
    tag: nusofthep-3.22.00
    paths:
    - included_yaml/specs-nusofthep.yaml
  - git: https://github.com/art-framework-suite/art-release-configs
    tag: art-3.14.04
    paths:
    - included_yaml/specs-art.yaml
  - git: https://github.com/fnal-fife/fife-release-configs
    commit: 4d43722522644a481f2b8aa7a4981b98a5df30e5
    paths:
    - included_yaml/fife_specs.yaml
  # DUNE specs
  - git: https://github.com/DUNE/dune-release-configs
    commit: f2ff5419c5850b54cb944c97bd5357ff46512f53
    paths:
    - included_yaml/dune-specs.yaml

  definitions:

# The following definitions should be defined by experiments in exp_packages.yaml and exp_specs.yaml
# and the git:(repo urls) and tag: or commit: included above.
#
  - specs_icarus:
      - icaruscode %build_compiler
      - icarus-data
      - icarus-signal-processing
      - icarusalg
      - icarusutil

  specs:
    - $specs_art
    - $specs_nusofthep
    - $specs_larsoft
    - $fife_specs
    - $specs_dune
    - $specs_icarus
    - $specs_sbn
    - artdaq-core %build_compiler
    - larcv2 %build_compiler
    - nusystematics %build_compiler
    - systematicstools %build_compiler
    - r-m-dd-config
    - py-srproxy
    - py-ipykernel
  concretizer:
    unify: true
    reuse:
      from:
      - type: local
      - type: external
  view: false
  packages:
    all:
      providers:
        libc:
        - glibc
        'zlib-api:':
        - zlib
      variants:
      - generator=ninja
      - build_type=Release
      - cxxstd=17
      target:
      - x86_64_v3
    nusystematics:
      require:
      - "@1"
    systematicstools:
      require:
      - "@1"
    python:
      require:
      - "@:3.10"
